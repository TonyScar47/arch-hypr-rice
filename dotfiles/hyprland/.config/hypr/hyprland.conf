# --- 1. EXTERNAL CONFIGURATION (MODULARITY) ---

# Import Catppuccin Mocha color palette from external file
source = ~/.config/hypr/colors.conf

# --- 2. MONITOR CONFIGURATION ---

# Syntax: monitor=name,res,offset,scale
# Set to 1 for standard Full HD. Change to 1.25 or 1.5 for HiDPI displays if UI is too small.
monitor=,highres,auto,1

# --- 3. INPUT & GESTURES ---

input {
    kb_layout = it          # Italian keyboard layout (supports à, è, ì, etc.)
    follow_mouse = 1        # Window focus follows mouse movement
    touchpad {
        disable_while_typing = 0
    }
}

gestures {
    workspace_swipe = 1     # Enable 3-finger swipe to switch workspaces
    workspace_swipe_invert = 1
}

# --- 4. GENERAL AESTHETICS ---

general {
    gaps_in = 5             # Inner gaps between windows
    gaps_out = 10           # Outer gaps between windows and screen edges
    border_size = 3
    
    # Mocha Gradient: Mauve to Blue at 45 degrees
    col.active_border = $mauve $blue 45deg 
    col.inactive_border = $surface0
    
    layout = dwindle        # Automatic window tiling logic
}

# --- 5. DECORATION & EFFECTS ---

decoration {
    rounding = 10           # Window corner radius
    blur = 0                # Blur disabled for performance
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

# --- 6. ANIMATIONS ---

animations {
    enabled = 1
    # Custom Bezier curve for smooth elastic motion
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    animation = windows, 1, 4, overshot, slide
    animation = border, 1, 10, default
    animation = fade, 1, 10, default
    animation = workspaces, 1, 3, overshot, slide
}

# --- 7. AUTOSTART (EXEC-ONCE) ---

# Initialize system services and environment
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swaybg -m fill -i Pictures/wallp.png
exec-once = waybar
exec-once = foot --server

# --- 8. KEYBINDINGS (MACROS) ---

$mainMod = SUPER # Sets Windows/Command key as the modifier

# Essential Application Shortcuts
bind = $mainMod, RETURN, exec, footclient       # Open Terminal
bind = $mainMod, D, exec, wofi --show drun      # Application Launcher
bind = $mainMod SHIFT, Q, killactive,           # Close focused window
bind = $mainMod, F, fullscreen,                 # Toggle Fullscreen
bind = $mainMod, SPACE, togglefloating,         # Toggle Floating Mode

# Window Focus Navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspace Switching (1-9)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move focused window to Workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9

# Mouse Interactions (Move/Resize)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow